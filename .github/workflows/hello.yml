name: My First Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  job1:
    runs-on: ubuntu-latest

    steps:
      - name: Print hello
        run: echo "Hello Navya 👋"

  job2:
    needs: job1
    runs-on: ubuntu-latest

    steps:
      - name: Print goodbye
        run: echo "Goodbye Navya 👋"