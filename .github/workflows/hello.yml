name: My First Workflow

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  say-hello:
    runs-on: ubuntu-latest

    steps:
      - name: Print message
        run: echo "Hello Navya 👋"

  say-bye:
    runs-on: ubuntu-latest

    steps:
      - name: Print goodbye
        run: echo "goodbye Navya"